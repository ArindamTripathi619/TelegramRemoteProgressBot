# OpenBridge API-Mode Reference
#
# This file is documentation-only. Runtime configuration is sourced from
# ~/.config/openbridge/bridge.env (generated by `openbridge setup`).
#
# OpenBridge now uses OpenCode server APIs (`opencode serve`) and per-chat
# sessions. Legacy monitor/analyzer YAML modes are not used.

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  allowed_chat_ids: "${TELEGRAM_ALLOWED_CHAT_IDS}"
  allow_all_chats: "${TELEGRAM_ALLOW_ALL_CHATS}"

opencode:
  model: "${OPENCODE_MODEL}"
  working_dir: "${OPENCODE_WORKING_DIR}"
  timeout_seconds: "${OPENCODE_TIMEOUT_SECONDS}"
  max_concurrent: "${OPENCODE_MAX_CONCURRENT}"
  api:
    base_url: "${OPENCODE_API_BASE_URL}"
    username: "${OPENCODE_API_USERNAME}"
    password: "${OPENCODE_API_PASSWORD}"
    timeout_seconds: "${OPENCODE_API_TIMEOUT_SECONDS}"
  server:
    username: "${OPENCODE_SERVER_USERNAME}"
    password: "${OPENCODE_SERVER_PASSWORD}"

llm:
  input:
    enabled: "${OPENBRIDGE_INPUT_LLM_ENABLED}"
    provider: "${OPENBRIDGE_INPUT_LLM_PROVIDER}"
    model: "${OPENBRIDGE_INPUT_LLM_MODEL}"
    api_key: "${OPENBRIDGE_INPUT_LLM_API_KEY}"
    base_url: "${OPENBRIDGE_INPUT_LLM_BASE_URL}"
    litellm_port: "${OPENBRIDGE_INPUT_LLM_LITELLM_PORT}"
    timeout_seconds: "${OPENBRIDGE_INPUT_LLM_TIMEOUT_SECONDS}"
  output:
    enabled: "${OPENBRIDGE_OUTPUT_LLM_ENABLED}"
    provider: "${OPENBRIDGE_OUTPUT_LLM_PROVIDER}"
    model: "${OPENBRIDGE_OUTPUT_LLM_MODEL}"
    api_key: "${OPENBRIDGE_OUTPUT_LLM_API_KEY}"
    base_url: "${OPENBRIDGE_OUTPUT_LLM_BASE_URL}"
    litellm_port: "${OPENBRIDGE_OUTPUT_LLM_LITELLM_PORT}"
    timeout_seconds: "${OPENBRIDGE_OUTPUT_LLM_TIMEOUT_SECONDS}"

logging:
  level: "${LOG_LEVEL}"

compatibility:
  # Kept only for migration readability. Prefer OPENBRIDGE_OUTPUT_LLM_* keys.
  legacy_output_decorator:
    enabled: "${OPENBRIDGE_DECORATOR_ENABLED}"
    api_key: "${OPENBRIDGE_DECORATOR_API_KEY}"
    model: "${OPENBRIDGE_DECORATOR_MODEL}"
    base_url: "${OPENBRIDGE_DECORATOR_BASE_URL}"
    timeout_seconds: "${OPENBRIDGE_DECORATOR_TIMEOUT_SECONDS}"
